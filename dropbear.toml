binaries = ["dropbear"]
paths = "/etc/dropbear"
mount_devpts = true

# No masks - ugrd.base.console runs normally on the local TTY
# Dropbear runs in the background as a secondary remote unlock path

[imports.config_processing]
"dropbear" = [ "_process_dropbear_authorized_keys" ]

[imports.build_tasks]
"dropbear" = [ "add_dropbear_keys", "add_unlock_script" ]

[imports.build_final]
"dropbear" = [ "dropbear_finalize" ]

[imports.init_pre]
"dropbear" = [ "drop_the_bear_background" ]

[imports.init_main]
"dropbear" = [ "crypt_poll", "crypt_poll_cleanup" ]

[imports.init_mount]
"dropbear" = [ "stop_dropbear" ]

[import_order.after]
drop_the_bear_background = "init_net"
crypt_poll = "handle_resume"
crypt_poll_cleanup = "crypt_init"

[custom_parameters]
dropbear_authorized_keys = "Path"
